<form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="description">Task Description:</label>
    <input
      type="text"
      id="description"
      minlength="4"
      maxlength="60"
      aria-describedby="descriptionError"
      formControlName="description"
      required
    />
    <p class="error-container">
      <span
        id="descriptionError"
        class="error-message"
        *ngIf="taskForm.get('description')?.invalid && taskForm.get('description')?.touched"
      >
        {{ getErrorMessage('description') }}
      </span>
    </p>
  </div>
  <div class="form-group">
    <label for="dueDate">Due Date:</label>
    <input
      id="dueDate"
      type="date"
      aria-describedby="dueDateError"
      formControlName="dueDate"
      required
    />
    <p class="error-container">
      <span
        id="dueDateError"
        class="error-message"
        *ngIf="taskForm.get('dueDate')?.invalid && taskForm.get('dueDate')?.touched"
      >
        {{ getErrorMessage('dueDate') }}
      </span>
    </p>
  </div>
  <div class="task-row">
    <button
      class="task-button"
      type="submit"
      [disabled]="!taskForm.valid"
    >
      {{ currentTask ? 'Update Task' : 'Add Task' }}
    </button>
    <button class="task-button" type="button" (click)="onCancel($event)">
      Cancel
    </button>
  </div>
</form>
